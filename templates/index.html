<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic AI Workshop - Certificate Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <div class="glass-card">
            <div class="card-header">
                <h1>Amity University Madhya Pradesh</h1>
                <p>Agentic AI Workshop</p>
            </div>
            
            <div class="card-body">
                <form id="certificateForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label for="enrollment">Enrollment Number</label>
                        <input type="text" id="enrollment" name="enrollment" placeholder="e.g. A60205225120" required>
                    </div>
                    
                    <div id="errorMessage" class="error-message"></div>
                    
                    <button type="submit" id="submitBtn" class="btn-primary">
                        <span class="btn-text">Generate Certificate</span>
                        <div class="loader" id="btnLoader"></div>
                    </button>
                </form>
            </div>
            
            <div class="card-footer">
                <p>Enter your name exactly as you want it to appear on the certificate.</p>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
